<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
<!-- D02 · Motion Design · "Onion-Skin Bounce Arc" · Family A (Dark Technical)
     Brief: briefs/d02-motion-design.md · Lock: style-lock-dark-technical.md (LOCKED 2026-06-07)
     Tokens: ground #1A1A18+grain · line #C9C9C4 · dim #7A7A74 · stroke 2 · NO ACCENT (set budget).
     Geometry: arcs M200,760 Q380,360 560,760 + M560,760 Q690,520 820,760 (dashed dim = reference)
