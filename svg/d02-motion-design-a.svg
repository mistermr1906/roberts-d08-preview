     · contact tick pairs at x=200 and x=560, y 776-796. -->
  <defs><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer></filter></defs>
  <rect width="1200" height="1200" fill="#1A1A18"/>
  <rect width="1200" height="1200" filter="url(#grain)"/>

  <g transform="translate(85,-75)"><!-- recenter rev2: ink bbox was low-left -->
