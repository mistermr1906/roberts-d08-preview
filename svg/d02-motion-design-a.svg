    <path d="M200,760 Q380,360 560,760"/>
    <path d="M560,760 Q690,520 820,760"/>
  </g>

  <!-- contact ticks -->
  <g stroke="#C9C9C4" stroke-width="2" stroke-linecap="round">
    <line x1="188" y1="776" x2="188" y2="796"/><line x1="212" y1="776" x2="212" y2="796"/>
    <line x1="548" y1="776" x2="548" y2="796"/><line x1="572" y1="776" x2="572" y2="796"/>
  </g>

  <!-- onion-skin frames: ramp .25/.35/.45/.55/.65/.8, final 1.0 + inner ring -->
  <g stroke="#C9C9C4" stroke-width="2" fill="none">
    <circle cx="265" cy="642" r="26" opacity="0.25"/>
    <circle cx="362" cy="562" r="26" opacity="0.35"/>
    <circle cx="398" cy="562" r="26" opacity="0.45"/>
    <circle cx="495" cy="642" r="26" opacity="0.55"/>
    <circle cx="638" cy="659" r="26" opacity="0.65"/>
    <circle cx="703" cy="641" r="26" opacity="0.8"/>
    <circle cx="781" cy="699" r="26"/>
    <circle cx="781" cy="699" r="12"/>
  </g>
  </g>
</svg>
